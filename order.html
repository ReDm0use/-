<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа</title>

    <link rel="stylesheet" href="/style.css">

    <style>
        .order-page {
            padding: 60px 0;
        }

        .order-page h1 {
            text-align: center;
            margin-bottom: 40px;
        }

        .order-form {
            max-width: 700px;
            margin: 0 auto;
        }

        .order-form input,
        .order-form textarea {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .order-form textarea {
            height: 120px;
            resize: none;
        }

        #map {
            width: 100%;
            height: 400px;
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .buy-btn {
            width: 100%;
            border: none;
            cursor: pointer;
        }

        .error {
            color: red;
            margin-top: 15px;
            line-height: 1.6;
        }

        .success {
            color: green;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>

</head>
<body>

<header class="header">
    <div class="container">

        <a href="index.html" class="logo">
            SHOP
        </a>

        <nav class="menu">
            <a href="index.html">Главная</a>
            <a href="catalog.html">Каталог</a>
            <a href="contacts.html">Контакты</a>
        </nav>

    </div>
</header>

<main>

    <section class="order-page">

        <div class="container">

            <h1>Оформление заказа</h1>

            <form class="order-form" id="orderForm">

                <input
                        type="text"
                        id="fio"
                        placeholder="ФИО"
                >

                <input
                        type="tel"
                        id="phone"
                        placeholder="Телефон (89991234567)"
                >

                <input
                        type="email"
                        id="email"
                        placeholder="Email"
                >

                <input
                        type="text"
                        id="address"
                        placeholder="Адрес доставки"
                >

                <div id="map"></div>

                <input
                        type="hidden"
                        id="coordinates"
                >

                <textarea
                        id="comment"
                        maxlength="500"
                        placeholder="Комментарий к заказу (макс. 500 символов)"
                ></textarea>

                <button type="submit" class="btn buy-btn">
                    Отправить заказ
                </button>

                <div id="result"></div>

            </form>

        </div>

    </section>

</main>

<footer class="footer">
    <div class="container">
        <p>© 2026 Интернет-магазин электроники</p>
    </div>
</footer>

<script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU"></script>

<script>

    ymaps.ready(init);

    function init() {

        const myMap = new ymaps.Map("map", {
            center: [55.751244, 37.618423],
            zoom: 10
        });

        let placemark = null;

        myMap.events.add('click', function (e) {

            const coords = e.get('coords');

            if (placemark) {

                placemark.geometry.setCoordinates(coords);

            } else {

                placemark = new ymaps.Placemark(
                    coords,
                    {
                        balloonContent:
                            'Координаты:<br>' +
                            coords[0].toFixed(6) +
                            ', ' +
                            coords[1].toFixed(6)
                    },
                    {
                        preset: 'islands#redDotIcon'
                    }
                );

                myMap.geoObjects.add(placemark);
            }

            placemark.properties.set(
                'balloonContent',
                'Координаты:<br>' +
                coords[0].toFixed(6) +
                ', ' +
                coords[1].toFixed(6)
            );

            placemark.balloon.open();

            document.getElementById('coordinates').value =
                coords[0] + ',' + coords[1];

        });
    }

    document.getElementById('orderForm').addEventListener('submit', function(e) {

        e.preventDefault();

        const errors = [];

        const fio = document.getElementById('fio').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const email = document.getElementById('email').value.trim();
        const address = document.getElementById('address').value.trim();
        const coordinates = document.getElementById('coordinates').value;

        if (fio === '') {
            errors.push('Не заполнено поле ФИО');
        }

        if (phone === '') {
            errors.push('Не заполнено поле Телефон');
        }

        if (
            phone !== '' &&
            !/^(8|7)\d{10}$/.test(phone)
        ) {
            errors.push('Телефон должен быть в формате 89991234567');
        }

        if (email === '') {
            errors.push('Не заполнено поле Email');
        }

        if (
            email !== '' &&
            !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)
        ) {
            errors.push('Некорректный Email');
        }

        if (address === '') {
            errors.push('Не заполнен адрес доставки');
        }

        if (coordinates === '') {
            errors.push('Не отмечен адрес доставки на карте');
        }

        const result = document.getElementById('result');

        if (errors.length > 0) {

            result.className = 'error';
            result.innerHTML = errors.join('<br>');

        } else {

            result.className = 'success';
            result.innerHTML = 'Заказ оформлен!';

            document.getElementById('orderForm').reset();
            document.getElementById('coordinates').value = '';

        }

    });

</script>

</body>
</html>
